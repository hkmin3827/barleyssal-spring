spring:
  application:
    name: barleyssal-spring

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 2000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50
        query.fail_on_pagination_over_collection_fetch: true
        show_sql: true
    open-in-view: false

  threads:
    virtual:
      enabled: true

  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: barleyssal:session

  data:
    redis:
      host: ${REDIS_HOST_NAME}
      port: 6379
      database: 1
      password: ${REDIS_PASSWORD}
      username: default
      timeout: 3000ms
      lettuce:
        pool:
          # 가상 스레드가 Redis를 동시에 호출할 때를 대비해 풀 크기를 약간 늘림
          max-active: 20
          max-idle: 10
          min-idle: 5
        shutdown-timeout: 200ms # 종료 시 빠른 정리

  server:
    tomcat:
      threads:
        max: 200 # 플랫폼 스레드 개수 (Virtual Thread의 캐리어 스레드로 활용됨)
      max-connections: 10000 # 동시에 유지할 수 있는 최대 연결 수
    forward-headers-strategy: native

  kafka:
    listener:
      concurrency: 1
      ack-mode: manual_immediate
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: barleyssal-stats-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
      fetch-max-wait: 500ms
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hakyung.barleyssal_spring.infrastruture.kafka.events"

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 10s
    data:
      elasticsearch:
        repositories:
          enabled: true

  mail:
    host: smtp.naver.com
    port: 587
    username: ${NAVER_EMAIL}
    password: ${NAVER_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax
rest:
  client:
    connect-timeout: 2000
    read-timeout: 5000

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000

app:
  policy:
    icon-upload:
      max-requests: 5
      window-seconds: 60
  frontend:
    base-url: ${FRONT_BASE_URL}

logging:
  level:
    org.springframework.security: INFO
    com.hakyung.barleyssal_spring: DEBUG
    org.apache.kafka.clients: WARN
    org.springframework.kafka: INFO
    org.apache.kafka: WARN