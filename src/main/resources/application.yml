spring:
  application:
    name: barleyssal-spring
  profiles:
    active: local

  flyway:
    baseline-on-migrate: true
    enabled: true

  threads:
    virtual:
      enabled: true

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 2000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 50
        query.fail_on_pagination_over_collection_fetch: true

  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: barleyssal:session

  data:
    redis:
      database: 1
      username: default
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          shutdown-timeout: 200ms

  server:
    tomcat:
      threads:
        max: 200
      max-connections: 10000
    forward-headers-strategy: native

  kafka:
    listener:
      concurrency: 1
      ack-mode: manual_immediate
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      linger.ms: 0
    consumer:
      group-id: barleyssal-stats-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
      fetch-max-wait: 100ms
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hakyung.barleyssal_spring.infrastruture.kafka.events"

  elasticsearch:
    connection-timeout: 5s
    socket-timeout: 10s
    data:
      elasticsearch:
        repositories:
          enabled: true

  mail:
    host: smtp.naver.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax

rest:
  client:
    connect-timeout: 2000
    read-timeout: 5000

jwt:
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: spring-app